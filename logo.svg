<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="12" ry="12" fill="#2563eb"/>
  <g fill="white">
    <!-- Top arm -->
    <rect x="22" y="10" width="58" height="20"/>
    <!-- Right descent (top-right connector) -->
    <rect x="62" y="30" width="18" height="20"/>
    <!-- Middle bar -->
    <rect x="22" y="42" width="58" height="16"/>
    <!-- Left descent (bottom-left connector) -->
    <rect x="22" y="50" width="18" height="20"/>
    <!-- Bottom arm -->
    <rect x="22" y="62" width="58" height="20"/>
    <!-- Left-pointing arrow on top arm -->
    <polygon points="7,20 22,10 22,30"/>
    <!-- Right-pointing arrow on bottom arm -->
    <polygon points="93,72 80,62 80,82"/>
  </g>
</svg>
