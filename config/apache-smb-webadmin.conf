# Apache VirtualHost configuratie voor SMB WebAdmin
# Kopieer naar: /etc/apache2/sites-available/smb-webadmin.conf
# Activeer met: sudo a2ensite smb-webadmin && sudo a2enmod proxy proxy_http && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName smb-webadmin.local
    DocumentRoot /var/www/html/smbadmin

    <Directory /var/www/html/smbadmin>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Flask API proxy – stuurt /api/* door naar de Flask backend op poort 5000
    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:5000/api/
    ProxyPassReverse /api/ http://127.0.0.1:5000/api/

    ErrorLog ${APACHE_LOG_DIR}/smb-webadmin-error.log
    CustomLog ${APACHE_LOG_DIR}/smb-webadmin-access.log combined
</VirtualHost>
